<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003778;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- White top section -->
  <rect width="800" height="180" fill="url(#top)"/>
  <!-- Blue bottom section -->
  <rect y="180" width="800" height="380" fill="url(#bg)"/>
  <!-- Diagonal cut -->
  <polygon points="0,140 800,180 800,140" fill="url(#bg)"/>
  <!-- LF Logo text -->
  <text x="400" y="60" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#003778" text-anchor="middle">THE</text>
  <text x="400" y="100" font-family="Arial Black, Arial" font-weight="900" font-size="48" fill="#003778" text-anchor="middle">LINUX</text>
  <text x="400" y="140" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#003778" text-anchor="middle">FOUNDATION</text>
  <!-- Certificate text -->
  <text x="400" y="260" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.85)" text-anchor="middle">The Linux Foundation hereby recognizes that</text>
  <text x="400" y="310" font-family="Georgia, serif" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="bold">Harini D</text>
  <text x="400" y="355" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.85)" text-anchor="middle">has successfully completed</text>
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Certificate — The Linux Foundation</text>
  <!-- Bottom info -->
  <line x1="150" y1="480" x2="650" y2="480" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="280" y="510" font-family="Georgia, serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">June 18, 2026</text>
  <text x="520" y="510" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">LF-lunhmt6o9w</text>
</svg>
